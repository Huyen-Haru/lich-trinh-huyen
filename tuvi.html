<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra Cứu Tử Vi Cá Nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,400;0,600;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0c10;--surface:#13141a;--card:#1a1c26;--border:#252836;--gold:#c8972a;--gold2:#f0c76a;--red:#c0392b;--green:#27ae60;--blue:#2980b9;--text:#e8e0d0;--muted:#7a7060;--done:#5be8a8;--pending:#e8d45b;--todo:#e87c5b;--accent:#8b6914;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;font-size:13px;min-height:100vh}
body{background-image:radial-gradient(ellipse at 20% 10%,rgba(200,151,42,.06) 0%,transparent 55%),radial-gradient(ellipse at 80% 90%,rgba(139,105,20,.04) 0%,transparent 55%)}
.container{max-width:900px;margin:0 auto;padding:20px 16px 60px}

/* HERO */
.hero{text-align:center;padding:30px 0 24px}
.hero-icon{font-size:44px;margin-bottom:8px}
.hero h1{font-family:'Noto Serif Display',serif;font-size:26px;color:var(--gold2);margin-bottom:6px}
.hero p{color:var(--muted);font-size:12px;max-width:420px;margin:0 auto}

/* FORM */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:24px}
.form-card h2{font-family:'Noto Serif Display',serif;font-size:17px;color:var(--gold2);margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.field input,.field select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:9px 11px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field select option{background:var(--card)}
.btn-submit{width:100%;background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;border:none;border-radius:8px;padding:12px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:opacity .15s;letter-spacing:.5px}
.btn-submit:hover{opacity:.88}

/* RESULTS */
.results{display:none}
.results.show{display:block}

/* PERSON BANNER */
.person-banner{background:linear-gradient(135deg,rgba(200,151,42,.13),rgba(139,105,20,.08));border:1px solid rgba(200,151,42,.28);border-radius:var(--r);padding:16px 20px;margin-bottom:18px}
.pb-name{font-family:'Noto Serif Display',serif;font-size:22px;color:var(--gold2);font-weight:600;margin-bottom:4px}
.pb-sub{font-size:12px;color:var(--muted);margin-bottom:10px}
.pb-chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.chip-gold{background:rgba(200,151,42,.12);color:var(--gold2);border-color:rgba(200,151,42,.25)}
.chip-green{background:rgba(91,232,168,.10);color:var(--done);border-color:rgba(91,232,168,.2)}
.chip-blue{background:rgba(126,200,240,.10);color:#7ec8f0;border-color:rgba(126,200,240,.2)}
.chip-red{background:rgba(232,124,91,.10);color:var(--todo);border-color:rgba(232,124,91,.2)}

/* TABS */
.tab-bar{display:flex;gap:4px;background:var(--card);border-radius:9px;padding:3px;margin-bottom:18px}
.tab-btn{flex:1;padding:8px 4px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;border:none;background:none;color:var(--muted);font-family:inherit;text-align:center}
.tab-btn.active{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}

/* DATE NAV */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.date-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;transition:all .15s;font-family:inherit}
.date-nav button:hover{border-color:var(--gold);color:var(--gold)}
.nav-label{font-weight:700;font-size:14px;color:var(--gold2);min-width:180px;text-align:center}
.btn-today{font-size:10px!important;padding:6px 10px!important}

/* SCORE BANNER */
.score-banner{border-radius:var(--r);padding:14px 18px;margin-bottom:16px;border:1px solid}
.score-banner.great{background:rgba(91,232,168,.07);border-color:rgba(91,232,168,.2)}
.score-banner.good{background:rgba(126,200,240,.07);border-color:rgba(126,200,240,.2)}
.score-banner.neutral{background:rgba(122,112,96,.07);border-color:rgba(122,112,96,.2)}
.score-banner.bad{background:rgba(232,124,91,.07);border-color:rgba(232,124,91,.2)}
.score-label{font-size:16px;font-weight:700;margin-bottom:4px}
.score-detail{font-size:12px;color:var(--muted);line-height:1.6}
.score-advice{margin-top:10px;font-size:12px;line-height:1.7;padding:10px 12px;background:rgba(200,151,42,.06);border-radius:7px}

/* 12 CUNG */
.cung-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .2s}
.cung-card:hover{border-color:rgba(200,151,42,.3)}
.cung-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.cung-icon{font-size:20px}
.cung-title{flex:1}
.cung-name{font-weight:700;font-size:14px;color:var(--gold2)}
.cung-sub{font-size:10px;color:var(--muted);margin-top:2px}
.cung-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid;flex-shrink:0}
.cung-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:6px}
.cung-today{font-size:12px;line-height:1.6;color:var(--text);padding:8px 10px;background:rgba(200,151,42,.04);border-radius:6px;margin-bottom:8px}
.cung-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.action-box{border-radius:6px;padding:8px}
.action-box.good{background:rgba(91,232,168,.06)}
.action-box.bad{background:rgba(232,124,91,.06)}
.action-title{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.action-box.good .action-title{color:var(--done)}
.action-box.bad .action-title{color:var(--todo)}
.action-item{display:flex;gap:5px;margin-bottom:3px;font-size:11px;line-height:1.5;color:var(--text)}

/* BAN MENH */
.bm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.bm-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.bm-card h4{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.bm-val{font-size:13px;font-weight:600;color:var(--text)}
.bm-val small{color:var(--muted);font-weight:400;display:block;font-size:10px;margin-top:2px}
.personality{background:linear-gradient(135deg,rgba(200,151,42,.08),rgba(139,105,20,.04));border:1px solid rgba(200,151,42,.18);border-radius:var(--r);padding:16px;margin-bottom:16px}
.personality h3{font-family:'Noto Serif Display',serif;font-size:15px;color:var(--gold2);margin-bottom:10px}
.personality p{font-size:12px;line-height:1.8;color:var(--text)}
.color-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.color-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--border);font-size:11px;font-weight:600}
.color-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.gio-grid-wrap{margin-bottom:16px}
.gio-grid-wrap h4{font-size:11px;font-weight:700;color:var(--gold2);margin-bottom:8px}
.gio-slots{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.gio-slot{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 2px;text-align:center;font-size:9px}
.gio-slot.hd{background:rgba(39,174,96,.1);border-color:rgba(91,232,168,.25);color:var(--done)}
.gio-slot.hc{color:var(--muted)}
.gio-slot.cur{border-color:var(--gold)}

/* LEGEND */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;font-size:10px}
.legend span{padding:2px 8px;border-radius:20px;border:1px solid}

/* LÁ SỐ */
.la-so-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.ls-cung{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;transition:border-color .15s}
.ls-cung:hover{border-color:rgba(200,151,42,.35)}
.ls-cung-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.ls-cung-name{font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:4px}
.ls-cung-chi{font-size:10px;color:var(--muted);margin-bottom:5px}
.ls-cung-desc{font-size:10px;line-height:1.6;color:var(--text)}
.ls-cung.highlight{border-color:var(--gold);background:rgba(200,151,42,.06)}
.nguyet-han-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.nh-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;transition:border-color .15s}
.nh-card.cur-month{border-color:var(--gold);background:rgba(200,151,42,.07)}
.nh-month{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:3px}
.nh-cung{font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:4px}
.nh-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.nh-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid}
.nh-desc{font-size:10px;line-height:1.6;color:var(--text)}
.than-cu-card{background:linear-gradient(135deg,rgba(200,151,42,.1),rgba(139,105,20,.06));border:1px solid rgba(200,151,42,.25);border-radius:10px;padding:14px;margin-bottom:16px}
/* TỨ TRỤ */
.tu-tru-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.tru-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center}
.tru-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.tru-can{font-size:18px;font-weight:700;color:var(--gold2);margin-bottom:2px}
.tru-chi{font-size:15px;color:var(--text);margin-bottom:4px}
.tru-hanh{font-size:10px;padding:2px 8px;border-radius:20px;display:inline-block;font-weight:700}
.tru-hanh.Kim{background:rgba(189,195,199,.15);color:#bdc3c7}
.tru-hanh.Moc{background:rgba(39,174,96,.12);color:#2ecc71}
.tru-hanh.Hoa{background:rgba(231,76,60,.12);color:#e74c3c}
.tru-hanh.Tho{background:rgba(200,151,42,.15);color:var(--gold2)}
.tru-hanh.Thuy{background:rgba(41,128,185,.12);color:#3498db}

/* ĐẠI VẬN */
.dai-van-section{margin-bottom:20px}
.dai-van-section h3{font-family:'Noto Serif Display',serif;font-size:16px;color:var(--gold2);margin-bottom:12px}
.dv-table{display:flex;flex-direction:column;gap:6px}
.dv-row{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 14px;display:grid;grid-template-columns:90px 80px 1fr 90px;align-items:center;gap:10px;transition:border-color .2s}
.dv-row.active{border-color:var(--gold);background:rgba(200,151,42,.06)}
.dv-row.past{opacity:.55}
.dv-age{font-size:13px;font-weight:700;color:var(--gold2)}
.dv-canchi{font-size:14px;font-weight:700;color:var(--text)}
.dv-desc{font-size:11px;color:var(--muted);line-height:1.5}
.dv-score{text-align:right;font-size:11px;font-weight:700}

/* TIỂU VẬN */
.tieu-van-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px}
.tv-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 6px;text-align:center;transition:border-color .2s}
.tv-card.active{border-color:var(--gold);background:rgba(200,151,42,.06)}
.tv-card.past{opacity:.5}
.tv-year{font-size:10px;color:var(--muted);margin-bottom:3px}
.tv-canchi{font-size:12px;font-weight:700;color:var(--text)}
.tv-hanh{font-size:9px;margin-top:3px}
.tv-score-dot{width:8px;height:8px;border-radius:50%;margin:4px auto 0}

/* NAM CHART */
.nam-months{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.nam-month{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .15s}
.nam-month:hover{border-color:var(--gold)}
.nam-month.cur{border-color:var(--gold);background:rgba(200,151,42,.07)}
.nm-label{font-size:10px;font-weight:700;color:var(--gold2);margin-bottom:4px}
.nm-chi{font-size:9px;color:var(--muted);margin-bottom:3px}
.nm-bar{height:4px;border-radius:4px;background:var(--border);overflow:hidden}
.nm-fill{height:100%;border-radius:4px}

@media(max-width:600px){.form-grid{grid-template-columns:1fr 1fr}.tab-btn{font-size:10px}.cung-actions{grid-template-columns:1fr}.nam-months{grid-template-columns:repeat(3,1fr)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="container">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-icon">☯️</div>
    <h1>Tra Cứu Tử Vi Cá Nhân</h1>
    <p>Xem tử vi theo ngày · tháng · năm dựa trên ngày giờ sinh của bạn</p>
  </div>

  <!-- FORM -->
  <div class="form-card">
    <h2>✏️ Nhập Thông Tin</h2>
    <div class="form-grid">
      <div class="field" style="grid-column:span 2">
        <label>Họ và tên</label>
        <input type="text" id="f-name" placeholder="Nguyễn Văn A" autocomplete="name">
      </div>
      <div class="field">
        <label>Giới tính</label>
        <select id="f-gender"><option value="female">Nữ</option><option value="male">Nam</option></select>
      </div>
      <div class="field">
        <label>Ngày sinh</label>
        <input type="number" id="f-day" placeholder="Ngày" min="1" max="31">
      </div>
      <div class="field">
        <label>Tháng sinh</label>
        <input type="number" id="f-month" placeholder="Tháng" min="1" max="12">
      </div>
      <div class="field">
        <label>Năm sinh</label>
        <input type="number" id="f-year" placeholder="Năm (vd: 1990)" min="1900" max="2010">
      </div>
      <div class="field">
        <label>Giờ sinh (0–23)</label>
        <input type="number" id="f-hour" placeholder="Giờ" min="0" max="23" value="12">
      </div>
    </div>
    <button class="btn-submit" onclick="submitForm()">🔮 Xem Tử Vi Của Tôi</button>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results">
    <div class="person-banner" id="personBanner"></div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-ban-menh" onclick="switchTab('ban-menh')">🌟 Bản Mệnh</button>
      <button class="tab-btn" id="tab-la-so" onclick="switchTab('la-so')">📜 Lá Số</button>
      <button class="tab-btn" id="tab-dai-van" onclick="switchTab('dai-van')">🌊 Đại/Tiểu Vận</button>
      <button class="tab-btn" id="tab-ngay" onclick="switchTab('ngay')">📅 Theo Ngày</button>
      <button class="tab-btn" id="tab-nam" onclick="switchTab('nam')">📆 Năm</button>
    </div>
    <div id="tab-content"></div>
  </div>

</div>
<script>
// ============================================================
//  LUNAR ENGINE (Ho Ngoc Duc algorithm)
// ============================================================
const LUNAR_INFO=[0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06aa0,0x0a6b6,0x056a0,0x02b40,0x0dae4,0x0ad50,0x12d60,0x0d2e3,0x0d950,0x0d557,0x056a0,0x0a570,0x01452,0x092e0,0x0e950,0x1d256,0x0b54a,0x0b550,0x0b6a0,0x1b965,0x092e0,0x0c960,0x0d954,0x0d4a0];
function INT(v){return Math.floor(v)}
function solarToLunar(y,m,d){let offset=Math.floor((new Date(y,m-1,d)-new Date(1900,0,31))/86400000);let i,temp=0;for(i=1900;i<2100&&offset>0;i++){temp=lunarYearDays(i);offset-=temp;}if(offset<0){offset+=temp;i--;}let lunarYear=i;let leapMonth=leapMonthOfYear(lunarYear);let leapDays=leapDays2(lunarYear);let monthDays2=[];for(i=1;i<=12;i++){monthDays2[i]=monthDays(lunarYear,i);}let month,day,leap=false;for(i=1;i<=12&&offset>0;i++){if(leapMonth>0&&i==leapMonth+1&&!leap){--i;leap=true;temp=leapDays;}else{temp=monthDays2[i];}if(leap&&i==leapMonth+1)leap=false;offset-=temp;}if(offset==0&&leapMonth>0&&i==leapMonth+1){if(leap){leap=false;}else{leap=true;--i;}}if(offset<0){offset+=temp;--i;}month=i;day=offset+1;return{day,month,year:lunarYear,leap};}
function lunarYearDays(y){let i,sum=348;for(i=0x8000;i>0x8;i>>=1){sum+=((LUNAR_INFO[y-1900]&i)?1:0);}return sum+leapDays2(y);}
function leapDays2(y){if(leapMonthOfYear(y)){return((LUNAR_INFO[y-1900]&0x10000)?30:29);}return 0;}
function leapMonthOfYear(y){return LUNAR_INFO[y-1900]&0xf;}
function monthDays(y,m){return((LUNAR_INFO[y-1900]&(0x10000>>m))?30:29);}

// ============================================================
//  CAN CHI ENGINE
// ============================================================
const CAN=['Giáp','Ất','Bính','Đinh','Mậu','Kỷ','Canh','Tân','Nhâm','Quý'];
const CHI=['Tý','Sửu','Dần','Mão','Thìn','Tỵ','Ngọ','Mùi','Thân','Dậu','Tuất','Hợi'];
const CHI_ICON=['🐭','🐮','🐯','🐰','🐲','🐍','🐴','🐑','🐵','🐓','🐶','🐷'];
const GIO_HD_MAP=[[0,1,3,5,6,10],[0,2,3,5,9,11],[0,1,4,6,7,9],[1,2,4,6,8,10],[0,2,3,5,7,11],[0,1,4,6,9,11],[0,1,3,5,6,10],[0,2,3,5,9,11],[0,1,4,6,7,9],[1,2,4,6,8,10],[0,2,3,5,7,11],[0,1,4,6,9,11]];
const GIO_TIME=['23–1h','1–3h','3–5h','5–7h','7–9h','9–11h','11–13h','13–15h','15–17h','17–19h','19–21h','21–23h'];
function julianDay(y,m,d){if(m<=2){m+=12;y--;}return INT(365.25*(y+4716))+INT(30.6001*(m+1))+d-1524;}
function canYear(y){return CAN[(y-4)%10]}
function chiYear(y){return CHI[(y-4)%12]}

function getKua(year,gender){
  let s=0,y=year;while(y>0){s+=y%10;y=Math.floor(y/10);}while(s>9){let s2=0,t=s;while(t>0){s2+=t%10;t=Math.floor(t/10);}s=s2;}

  else{let k=(s+4)%9;if(k===0)k=9;if(k===5)k=2;return k;}
}

//  TÍNH CUNG MỆNH CHI (vị trí cung Mệnh trên vòng 12 cung)
// ============================================================
function calcMenhChi(lunarMonth,birthHour,gender){
  const gioChiIdx=hourToGioChi(birthHour);
  let thangChi;
  if(gender==='male'){thangChi=(2+lunarMonth-1)%12;}
  else{thangChi=((2-(lunarMonth-1))%12+12)%12;}
  let menhChi;
  if(gender==='male'){menhChi=(thangChi+gioChiIdx)%12;}
  else{menhChi=((thangChi-gioChiIdx)%12+12)%12;}
  return menhChi;
}

const SINH={Mộc:'Hỏa',Hỏa:'Thổ',Thổ:'Kim',Kim:'Thủy',Thủy:'Mộc'};
const KHAC={Mộc:'Thổ',Thổ:'Thủy',Thủy:'Hỏa',Hỏa:'Kim',Kim:'Mộc'};
function calcScore(transitHanh,userHanh){
  if(transitHanh===userHanh)return 0;
  if(SINH[transitHanh]===userHanh)return 2;
  if(SINH[userHanh]===transitHanh)return 1;
  if(KHAC[transitHanh]===userHanh)return-2;
  if(KHAC[userHanh]===transitHanh)return-1;
  return 0;
}
function getCungInfluence(cungChiIdx,transitChiIdx,globalScore){
  const dist=(cungChiIdx-transitChiIdx+12)%12;
  let score=0;let tag='';let detail='';
  if(dist===0){score=3;tag='🌟 Trực Chiếu';detail='Năng lượng tập trung mạnh vào cung này – nổi bật, dễ có kết quả đáng kể.';}
  else if(dist===4||dist===8){score=2;tag='✅ Tam Hợp';detail='Vận khí hài hòa tam hợp – thuận lợi, dễ tiến triển tốt.';}
  else if(dist===1||dist===11){score=1;tag='☀️ Lục Hợp';detail='Nhẹ nhàng thuận lợi – mọi việc trong lĩnh vực này dễ dàng hơn.';}
  else if(dist===6){score=-2;tag='⚠️ Xung Chiếu';detail='Cần thận trọng, dễ gặp trở ngại – tránh ra quyết định lớn trong lĩnh vực này.';}
  else if(dist===3||dist===9){score=-1;tag='⬛ Hình Xung';detail='Có thể có ma sát nhỏ – cần kiên nhẫn và linh hoạt xử lý.';}
  else{score=0;tag='☯️ Bình Thường';detail='Không có tác động đặc biệt – mọi việc diễn ra bình thường theo quán tính.';}
  if(globalScore>=2&&score>=0)score+=1;
  if(globalScore<0&&score>0)score-=1;
  return{score,tag,detail};
}

function getTieuHanDir(birthYear,gender){
  const isYang=canYearIdx(birthYear)%2===0;
  return((gender==='male')===isYang)?1:-1;
}
function getTieuHanStart(gender,birthYear){
  const dir=getTieuHanDir(birthYear,gender);
  return dir===1?2:8; // thuận→Dần(2), nghịch→Thân(8)
}
function getTieuHanCung(birthYear,gender,targetYear){
  const dir=getTieuHanDir(birthYear,gender);
  const start=getTieuHanStart(gender,birthYear);
  const age=targetYear-birthYear+1; // Vietnamese age
  return((start+dir*(age-1))%12+12)%12;
}

function canHourIdx(dayCanIdx,hourChiIdx){return(dayCanIdx*2+hourChiIdx)%10}
function canHour(dayCanIdx,hourChiIdx){return CAN[canHourIdx(dayCanIdx,hourChiIdx)]}

// Tiết khí (jié) dates: [solar_month, approx_day] for lunar month 1-12
const SOLAR_TERM=[
  [2,4],[3,6],[4,5],[5,6],[6,6],[7,7],
  [8,7],[9,8],[10,8],[11,7],[12,7],[1,5]
];
function getTermDate(lunarMonth,solarYear){
  const[sm,sd]=SOLAR_TERM[(lunarMonth-1)%12];
  const ty=lunarMonth===12?solarYear+1:solarYear;
  return new Date(ty,sm-1,sd);
}
function getDaiVanDir(birthYear,gender){
  // Yang year can index = even; male+yang or female+yin = thuận(+1)
  const isYang=canYearIdx(birthYear)%2===0;
  return((gender==='male')===isYang)?1:-1;
}
function calcStartAge(birthYear,birthMonth,birthDay,lunarMonth,dir){
  const bd=new Date(birthYear,birthMonth-1,birthDay);
  let tm=getTermDate(lunarMonth,birthYear);
  if(dir===1){
    if(tm<=bd){const nl=lunarMonth===12?1:lunarMonth+1;const ny=lunarMonth===12?birthYear+1:birthYear;tm=getTermDate(nl,ny);}
  }else{
    if(tm>=bd){const pl=lunarMonth===1?12:lunarMonth-1;const py=lunarMonth===1?birthYear-1:birthYear;tm=getTermDate(pl,py);}
  }
  const days=Math.abs(tm-bd)/86400000;
  return Math.round(days/3*10)/10;
}
function calcDaiVanList(birthYear,birthMonth,birthDay,lunarMonth,gender){
  const dir=getDaiVanDir(birthYear,gender);
  const startAge=calcStartAge(birthYear,birthMonth,birthDay,lunarMonth,dir);
  let canIdx=canMonthIdx(birthYear,lunarMonth);
  let chiIdx=chiMonthIdx(lunarMonth);
  const list=[];
  for(let i=0;i<8;i++){
    canIdx=((canIdx+dir)%10+10)%10;
    chiIdx=((chiIdx+dir)%12+12)%12;
    const ageStart=Math.round(startAge)+i*10;
    list.push({can:CAN[canIdx],chi:CHI[chiIdx],canIdx,chiIdx,hanh:canToHanh(CAN[canIdx]),ageStart,ageEnd:ageStart+9,i});
  }
  return{list,startAge,dir,dirLabel:dir===1?'Thuận (Nam dương / Nữ âm)':'Nghịch (Nam âm / Nữ dương)'};
}
function calcTieuVanList(dv,birthYear,gender){
  const dir=getDaiVanDir(birthYear,gender);
  let ci=dv.canIdx,xi=dv.chiIdx;
  const list=[];
  for(let i=0;i<10;i++){
    const yr=birthYear+dv.ageStart+i;
    list.push({can:CAN[ci],chi:CHI[xi],canIdx:ci,chiIdx:xi,hanh:canToHanh(CAN[ci]),age:dv.ageStart+i,year:yr});
    ci=((ci+dir)%10+10)%10;xi=((xi+dir)%12+12)%12;
  }
  return list;
}

function daiVanDesc(hanh,score){

    1:'Đại vận thuận lợi – tiến triển ổn định, các kế hoạch dễ thực hiện.',

    '-1':'Đại vận cần thận trọng – có thể gặp thử thách, cần kiên nhẫn và tích lũy.',

  return map[score]||map[0];
}
function getTuTru(u){
  const yCanIdx=canYearIdx(u.year);
  const mCanIdx=canMonthIdx(u.year,u.lunar.month);
  const dCanIdx=canDayIdx(u.year,u.month,u.day);

  ];
}

// ============================================================
//  SWITCH TAB
// ============================================================
function switchTab(tab){
  currentTab=tab;
  ['ban-menh','la-so','dai-van','ngay','thang','nam'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el)el.classList.toggle('active',t===tab);
  });
  if(tab==='ban-menh')renderBanMenh();
  else if(tab==='la-so')renderLaSo();
  else if(tab==='dai-van')renderDaiVan();
  else if(tab==='ngay')renderNgay();
  else if(tab==='thang')renderThang();
  else if(tab==='nam')renderNam();
}

function navDateChange(dir){
  const t=currentTab;
  if(t==='ngay'){navDate=new Date(navDate.getTime()+dir*86400000);}
  else if(t==='thang'){navDate=new Date(navDate.getFullYear(),navDate.getMonth()+dir,1);}
  else if(t==='nam'){navDate=new Date(navDate.getFullYear()+dir,0,1);}
  if(t==='ngay')renderNgay();else if(t==='thang')renderThang();else renderNam();
}
function goNow(){navDate=new Date();if(currentTab==='ngay')renderNgay();else if(currentTab==='thang')renderThang();else renderNam();}

function dateNavHTML(label){
  return`<div class="date-nav">
    <button onclick="navDateChange(-1)">← Trước</button>
    <span class="nav-label">${label}</span>
    <button onclick="navDateChange(1)">Sau →</button>
    <button class="btn-today" onclick="goNow()">Hôm nay</button>
  </div>`;}

function renderLaSo(){
  const u=USER;

  // THÂN CƯ
  const thanOffset=getStanCung(u.gioChiIdx);
  const thanCungIdx=(u.menhChi+thanOffset)%12;
  const thanCungName=CUNG_DESC_MAP[thanOffset].ten;

  // TIỂU HẠN năm hiện tại
  const thCung=getTieuHanCung(u.year,u.gender,curYear);
  const thOffset=((thCung-u.menhChi)+12)%12;
  const thInfo=NGUYET_HAN_ADVICE[thOffset];
  const thName=CUNG_DESC_MAP[thOffset].ten;
  const thAge=curYear-u.year+1;

  // PHÂN TÍCH TỔNG QUAN (từ đặc điểm Thân cư, Sao Mệnh, Nạp Âm)
  const tongQuanText=[
    `<p style="margin-bottom:8px"><strong style="color:var(--gold2)">Thân cư cung ${thanCungName}:</strong> Thân cư tại ${thanCungName} biểu thị đây là người luôn xoay quanh vấn đề ${CUNG_DESC_MAP[thanOffset].chu.toLowerCase()}. Tâm lực và sức sống của bạn tập trung mạnh vào lĩnh vực này – đây là nơi bạn cống hiến nhiều nhất và cũng là nơi cần được nuôi dưỡng.</p>`,
    `<p style="margin-bottom:8px"><strong style="color:var(--gold2)">Sao Chủ Mệnh – ${u.saoMenh.ten}:</strong> ${u.saoMenh.desc} Vận mệnh mang đặc tính của sao này xuyên suốt cuộc đời.</p>`,
    `<p style="margin-bottom:8px"><strong style="color:var(--gold2)">Nạp Âm ${u.napAm.ten} (${u.napAm.hanh}):</strong> ${u.napAm.desc}</p>`,
    `<p><strong style="color:var(--gold2)">Mệnh ${u.kuaInfo.ten} (${u.kuaInfo.hanh}):</strong> ${u.kuaInfo.desc}</p>`,
  ].join('');

  // 12 CUNG TỔNG QUAN
  const cungGridHtml=CUNG_DESC_MAP.map((c,i)=>{
    const chiIdx=(u.menhChi+i)%12;
    const isMetnh=i===0;

  // TIỂU HẠN INFO

    <div class="score-banner ${thScoreCls}" style="margin-bottom:16px">

  // 12 THÁNG NGUYỆT HẠN
  const nguyetHanHtml=Array.from({length:12},(_,i)=>{

let selectedDvIdx=null;
function renderDaiVan(){
  const u=USER;

  const tuTru=getTuTru(u);

  // Tứ Trụ

  // Nếu chưa chọn, mặc định vào đại vận đang chạy
  if(selectedDvIdx===null){
    selectedDvIdx=dv.list.findIndex(d=>currentAge>=d.ageStart&&currentAge<=d.ageEnd);

  }).join('');

  // Tiểu vận của đại vận đang chọn
  const tvHtml=tieuVan.map(tv=>{

      <div class="tv-score-dot" style="background:${dot}"></div>

  // Phân tích tổng quan lá số
  const tongQuanHtml=`
    <div style="background:linear-gradient(135deg,rgba(200,151,42,.08),rgba(139,105,20,.04));border:1px solid rgba(200,151,42,.2);border-radius:10px;padding:16px;margin-bottom:20px">

        <strong style="color:var(--gold2)">Năm sinh ${tuTru[0].can} ${tuTru[0].chi}:</strong> hành <strong>${tuTru[0].hanh}</strong> – thể hiện hoàn cảnh gia đình thuở nhỏ và vận mệnh chung.
      </p>
      <p style="font-size:12px;line-height:1.8;color:var(--text);margin-bottom:8px">

      </p>
      <p style="font-size:12px;line-height:1.8;color:var(--text)">
        <strong style="color:var(--gold2)">Giờ sinh ${tuTru[3].can} ${tuTru[3].chi}:</strong> hành <strong>${tuTru[3].hanh}</strong> – liên quan đến con cái, sự nghiệp về sau và mong muốn sâu xa bên trong.
      </p>
      <div style="margin-top:12px;padding:10px;background:rgba(200,151,42,.06);border-radius:7px;font-size:11px;color:var(--muted);line-height:1.7">
        🌀 <strong style="color:var(--text)">Hướng đại vận:</strong> ${dv.dirLabel} · Bắt đầu hành đại vận đầu tiên từ khoảng <strong style="color:var(--gold2)">${Math.round(dv.startAge)} tuổi</strong>
      </div>
    </div>`;

  document.getElementById('tab-content').innerHTML=`
    <h3 style="font-family:'Noto Serif Display',serif;font-size:16px;color:var(--gold2);margin-bottom:12px">🎴 Tứ Trụ Bát Tự</h3>
    <div class="tu-tru-grid">${tuTruHtml}</div>
    ${tongQuanHtml}
    <div class="dai-van-section">
      <h3>🌊 Đại Vận – Chu Kỳ 10 Năm <span style="font-size:11px;font-weight:400;color:var(--muted)">(Click vào đại vận để xem tiểu vận)</span></h3>
      <div class="dv-table">${dvHtml}</div>
    </div>
    <div style="margin-bottom:20px">
      <h3 style="font-family:'Noto Serif Display',serif;font-size:15px;color:var(--gold2);margin-bottom:10px">
        🔹 Tiểu Vận trong Đại Vận <strong>${curDv.can} ${curDv.chi}</strong> (Tuổi ${curDv.ageStart}–${curDv.ageEnd})
        <span style="font-size:10px;font-weight:400;color:var(--muted);margin-left:6px">▲ = năm hiện tại</span>
      </h3>
      <div class="tieu-van-grid">${tvHtml}</div>
      <div style="font-size:11px;line-height:1.8;color:var(--muted);padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px">
        💡 <strong style="color:var(--text)">Cách đọc tiểu vận:</strong> Mỗi năm trong đại vận chịu ảnh hưởng của một can chi riêng (tiểu vận). Năm nào tiểu vận tương sinh với bản mệnh <strong style="color:var(--gold2)">${u.napAm.hanh}</strong> thì thuận lợi hơn. Kết hợp với lưu niên (can chi năm dương lịch) để có phân tích chính xác nhất.
      </div>
    </div>`;
}

// ============================================================
//  THEO NGÀY
// ============================================================
function renderNgay(){
  const y=navDate.getFullYear(),m=navDate.getMonth()+1,d=navDate.getDate();
  const dc=canDay(y,m,d),dch=chiDay(y,m,d);
  const dayHanh=canToHanh(dc);
  const lunar=solarToLunar(y,m,d);
  const globalScore=calcScore(dayHanh,USER.napAm.hanh);
  const scoreL=globalScore>=2?'🌟 Đại Cát – Rất thuận lợi':globalScore===1?'✅ Cát – Tương đối tốt':globalScore<0?'⚠️ Cần thận trọng':'☯️ Bình thường';
  const scCls=scoreClass(globalScore);
  const hdList=getGioHD(y,m,d);
  const transitChiIdx=(julianDay(y,m,d)+12)%12;
  const isGood=isNgayDep(y,m,d)&&!isNgayXau(y,m,d);
  const isBad=isNgayXau(y,m,d);

  // Giờ Hoàng Đạo hôm nay trong giờ làm việc (7-18h)
  const gioWorkHtml=Array.from({length:12},(_,i)=>{
    const isHD=hdList.includes(i);
    const isBirthGio=i===USER.gioChiIdx;
    return`<div class="gio-slot ${isHD?'hd':'hc'} ${isBirthGio?'cur':''}">
      <div style="font-weight:700">${CHI[i]}</div>
      <div>${GIO_TIME[i]}</div>
      <div>${isHD?'🟢':'⬛'}${isBirthGio?' ⭐':''}</div>
    </div>`;
  }).join('');

  const adviceMap={
    2:`✨ Ngày ${dc} ${dch} rất thuận với bản mệnh ${USER.napAm.hanh} của bạn. Hành ${dayHanh} tương sinh mạnh – đây là ngày tốt để ra quyết định, ký kết, gặp gỡ quan trọng và tiến hành các việc lớn.`,
    1:`🌟 Ngày ${dc} ${dch} tương đối thuận với bản mệnh của bạn. Phù hợp cho công việc thường ngày và phát triển các mối quan hệ. Hãy chọn giờ Hoàng Đạo để làm việc quan trọng.`,
    '-1':`⚠️ Ngày ${dc} ${dch} có hành ${dayHanh} xung khắc với bản mệnh ${USER.napAm.hanh}. Nên thận trọng trong quyết định lớn, tránh xung đột và tập trung vào công việc nhẹ nhàng.`,
    '-2':`❌ Ngày ${dc} ${dch} khắc mệnh ${USER.napAm.hanh}. Hạn chế ký kết, giao dịch lớn. Tập trung hoàn thiện việc cũ, tránh khởi sự mới quan trọng.`,
    0:`☯️ Ngày ${dc} ${dch} bình thường với bản mệnh của bạn. Phù hợp duy trì công việc đều đặn.`,
  }[globalScore]||'';

  document.getElementById('tab-content').innerHTML=`
    ${dateNavHTML(fmt(navDate))}
    <div class="score-banner ${scCls}" style="margin-bottom:16px">
      <div class="score-label" style="color:${scoreColor(globalScore)}">${scoreL} ${isGood?'✨ Ngày Hoàng Đạo':''} ${isBad?'⛔ Ngày Nguyệt Kỵ':''}</div>
      <div class="score-detail">Ngày <strong>${dc} ${dch}</strong> – Hành <strong>${dayHanh}</strong> · Âm lịch <strong>${lunar.day}/${lunar.month}${lunar.leap?' nhuận':''}</strong> · Bản mệnh: <strong>${USER.napAm.hanh}</strong></div>
      <div class="score-advice">${adviceMap}</div>
    </div>
    <div class="gio-grid-wrap" style="margin-bottom:16px">
      <h4>⏰ Giờ Hoàng Đạo hôm nay (⭐ = giờ sinh của bạn)</h4>
      <div class="gio-slots">${gioWorkHtml}</div>
    </div>
    <h3 style="font-family:'Noto Serif Display',serif;font-size:16px;color:var(--gold2);margin-bottom:12px">🔮 12 Cung Hôm Nay</h3>
    ${render12Cung(transitChiIdx,globalScore,dayHanh)}`;
}

// ============================================================
//  THEO THÁNG
// ============================================================
function renderThang(){
  const y=navDate.getFullYear(),m=navDate.getMonth()+1;
  const mc=canMonth(y,m),mch=chiMonth(m);
  const mHanh=canToHanh(mc);
  const globalScore=calcScore(mHanh,USER.napAm.hanh);
  const scoreL=globalScore>=2?'🌟 Đại Cát – Tháng rất thuận':globalScore===1?'✅ Cát – Tháng tốt':globalScore<0?'⚠️ Cần thận – Tháng thử thách':'☯️ Bình ổn – Tháng trung bình';
  const scCls=scoreClass(globalScore);
  const transitChiIdx=(m+1)%12; // chi tháng index

  // Đếm ngày tốt trong tháng
  const lastDay=new Date(y,m,0).getDate();
  const goodDays=[];
  for(let dd=1;dd<=lastDay;dd++){
    if(isNgayDep(y,m,dd)&&!isNgayXau(y,m,dd)){
      const tv=calcScore(canToHanh(canDay(y,m,dd)),USER.napAm.hanh);
      goodDays.push({dd,score:tv});
    }
  }
  goodDays.sort((a,b)=>b.score-a.score);
  const topDaysHtml=goodDays.slice(0,6).map(x=>`
    <div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:rgba(91,232,168,.05);border:1px solid rgba(91,232,168,.12);border-radius:6px;margin-bottom:4px">
      <span>✨</span><strong style="color:var(--gold2)">${x.dd}/${m}/${y}</strong>
      <span style="font-size:10px;color:var(--done)">${x.score>=2?'Đại Cát':'Cát'}</span>
    </div>`).join('');

  const adviceMap={
    2:`✨ Tháng ${mc} ${mch} đại cát với bản mệnh ${USER.napAm.hanh} của bạn. Đây là tháng tiến công – ra quyết định lớn, ký kết, mở rộng. Hành ${mHanh} tương sinh mạnh – khả năng giao tiếp và thuyết phục của bạn ở đỉnh cao.`,
    1:`🌟 Tháng ${mc} ${mch} tương đối thuận. Công việc tiến triển ổn định, các mối quan hệ được củng cố. Tập trung hoàn thiện những gì đang dang dở và xây dựng nền tảng cho giai đoạn tiếp theo.`,
    '-1':`⚠️ Tháng ${mc} ${mch} có hành ${mHanh} xung khắc với bản mệnh ${USER.napAm.hanh}. Cần thận trọng trong quyết định lớn, tránh nóng vội. Tập trung vào những việc chắc chắn.`,
    '-2':`❌ Tháng ${mc} ${mch} khắc mệnh ${USER.napAm.hanh} khá mạnh. Hạn chế khởi sự mới quan trọng. Đây là tháng tích lũy, củng cố nội lực, tránh tiến công.`,
    0:`☯️ Tháng ${mc} ${mch} bình ổn với bản mệnh của bạn. Phù hợp duy trì nhịp làm việc đều đặn.`,
  }[globalScore]||'';

  document.getElementById('tab-content').innerHTML=`
    ${dateNavHTML(`${MONTHS_VI[m-1]} ${y}`)}
    <div class="score-banner ${scCls}" style="margin-bottom:16px">
      <div class="score-label" style="color:${scoreColor(globalScore)}">${scoreL}</div>
      <div class="score-detail">Tháng <strong>${mc} ${mch}</strong> – Hành <strong>${mHanh}</strong> · Bản mệnh: <strong>${USER.napAm.hanh}</strong></div>
      <div class="score-advice">${adviceMap}</div>
    </div>
    ${topDaysHtml?`<div style="margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px"><div style="font-size:10px;font-weight:700;color:var(--done);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">✨ Ngày đẹp nhất tháng ${m}/${y}</div>${topDaysHtml}</div>`:''}
    <h3 style="font-family:'Noto Serif Display',serif;font-size:16px;color:var(--gold2);margin-bottom:12px">🔮 12 Cung Tháng ${m}/${y}</h3>
    ${render12Cung(transitChiIdx,globalScore,mHanh)}`;
}

// ============================================================
//  THEO NĂM
// ============================================================
function renderNam(){
  const y=navDate.getFullYear();
  const yc=canYear(y),ych=chiYear(y);
  const yHanh=canToHanh(yc);
  const globalScore=calcScore(yHanh,USER.napAm.hanh);
  const scoreL=globalScore>=2?'🌟 Đại Cát – Năm rất thuận':globalScore===1?'✅ Cát – Năm tốt':globalScore<0?'⚠️ Cần thận – Năm thử thách':'☯️ Bình ổn – Năm trung bình';
  const scCls=scoreClass(globalScore);
  const transitChiIdx=chiYearIdx(y);

  const adviceMap={
    2:`✨ Năm ${yc} ${ych} đại cát với bản mệnh ${USER.napAm.hanh} của bạn. Đây là năm bứt phá – mở rộng sự nghiệp, đầu tư, ký kết. Hành ${yHanh} tương sinh mạnh với mệnh bạn.`,
    1:`🌟 Năm ${yc} ${ych} tương đối thuận. Sự nghiệp tiến triển ổn định, các kế hoạch dài hạn được củng cố. Tập trung xây dựng nền tảng vững chắc.`,
    '-1':`⚠️ Năm ${yc} ${ych} có thử thách với bản mệnh ${USER.napAm.hanh}. Cần thận trọng hơn, tránh quyết định lớn vội vàng. Đây là năm tích lũy và ổn định.`,
    '-2':`❌ Năm ${yc} ${ych} khắc mệnh ${USER.napAm.hanh}. Hạn chế khởi sự lớn. Tập trung duy trì và phòng thủ, xử lý những việc tồn đọng.`,
    0:`☯️ Năm ${yc} ${ych} bình ổn với bản mệnh của bạn. Phát triển đều đặn, không đột biến lớn.`,
  }[globalScore]||'';

  // 12 tháng mini chart
  const monthsHtml=Array.from({length:12},(_,i)=>{
    const bm=i+1;
    const bmc=canMonth(y,bm);
    const bmHanh=canToHanh(bmc);
    const sc=calcScore(bmHanh,USER.napAm.hanh);
    const c=sc>=2?'var(--done)':sc>=1?'#7ec8f0':sc<=- 1?'var(--todo)':'var(--muted)';
    const pct=Math.max(0,Math.min(100,(sc+2)/4*100));
    const isNow=navDate.getMonth()===i&&navDate.getFullYear()===y;
    return`<div class="nam-month ${isNow?'cur':''}" onclick="navDate=new Date(${y},${i},1);switchTab('thang')">
      <div class="nm-label">${MONTHS_VI[i]}</div>
      <div class="nm-chi" style="color:${c}">${canMonth(y,bm)} ${chiMonth(bm)} · ${bmHanh}</div>
      <div class="nm-bar"><div class="nm-fill" style="width:${pct}%;background:${c}"></div></div>
      <div style="font-size:9px;color:${c};margin-top:2px">${sc>=2?'Đại Cát':sc>=1?'Cát':sc<0?'Cẩn thận':'Bình thường'}</div>
    </div>`;
  }).join('');

  document.getElementById('tab-content').innerHTML=`
    ${dateNavHTML(`Năm ${y} – ${yc} ${ych} ${CHI_ICON[chiYearIdx(y)]}`)}
    <div class="score-banner ${scCls}" style="margin-bottom:16px">
      <div class="score-label" style="color:${scoreColor(globalScore)}">${scoreL}</div>
      <div class="score-detail">Năm <strong>${yc} ${ych}</strong> – Hành <strong>${yHanh}</strong> · Bản mệnh: <strong>${USER.napAm.hanh}</strong></div>
      <div class="score-advice">${adviceMap}</div>
    </div>
    <div style="margin-bottom:16px">
      <h4 style="font-size:11px;font-weight:700;color:var(--gold2);margin-bottom:10px">📊 Vận từng tháng trong năm ${y} – Click để xem chi tiết</h4>
      <div class="nam-months">${monthsHtml}</div>
    </div>
    <h3 style="font-family:'Noto Serif Display',serif;font-size:16px;color:var(--gold2);margin-bottom:12px">🔮 12 Cung Năm ${y}</h3>
    ${render12Cung(transitChiIdx,globalScore,yHanh)}`;
}

// Auto-focus first input
document.getElementById('f-name').focus();
</script>
</body>
</html>
